<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>一次访客问答如何流转</title>
  <desc>访客请求经过公开接口校验后，优先使用快捷问题绑定的意图路由，否则自动检测意图；意图路径直接输出可信文章卡片，未命中时进入 RAG 并通过 Halo AI Foundation 流式生成，最后统一发送 SSE 并异步记录日志。</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="20" x2="1530" y2="880" gradientUnits="userSpaceOnUse"><stop stop-color="#0B1220"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <linearGradient id="endpoint" x1="220" y1="130" x2="560" y2="200" gradientUnits="userSpaceOnUse"><stop stop-color="#0C4A6E"/><stop offset="1" stop-color="#1E3A8A"/></linearGradient>
    <linearGradient id="core" x1="620" y1="130" x2="980" y2="200" gradientUnits="userSpaceOnUse"><stop stop-color="#3730A3"/><stop offset="1" stop-color="#6D28D9"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" stroke="#C7D2FE" stroke-opacity=".04"/></pattern>
    <filter id="shadow" x="-25%" y="-35%" width="150%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#020617" flood-opacity=".34"/></filter>
    <marker id="blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#60A5FA"/></marker>
    <marker id="purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#A78BFA"/></marker>
    <marker id="green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#34D399"/></marker>
    <marker id="orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#FB923C"/></marker>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#bg)"/><rect width="1600" height="900" rx="32" fill="url(#grid)"/>
  <text x="64" y="66" fill="#F8FAFC" font-family="Inter, PingFang SC, sans-serif" font-size="30" font-weight="760">一次访客问答如何流转</text>
  <text x="64" y="94" fill="#94A3B8" font-family="Inter, PingFang SC, sans-serif" font-size="15">快捷问题可直达意图路由 · 意图路径不调用回答模型 · RAG 通过 AI Foundation 流式生成 · SSE 与日志统一收口</text>
  <g transform="translate(1190 55)" font-family="Inter, PingFang SC, sans-serif"><circle cx="5" cy="5" r="5" fill="#60A5FA"/><text x="18" y="10" fill="#CBD5E1" font-size="13">请求</text><circle cx="91" cy="5" r="5" fill="#A78BFA"/><text x="104" y="10" fill="#CBD5E1" font-size="13">编排 / 模型</text><circle cx="222" cy="5" r="5" fill="#34D399"/><text x="235" y="10" fill="#CBD5E1" font-size="13">响应 / 记录</text></g>

  <!-- 参与者 -->
  <g font-family="Inter, PingFang SC, sans-serif" filter="url(#shadow)">
    <rect x="40" y="130" width="140" height="66" rx="17" fill="#102A43" stroke="#38BDF8" stroke-opacity=".6"/><circle cx="69" cy="163" r="14" fill="#38BDF8" fill-opacity=".18"/><path d="M63 167c3-6 9-6 12 0M69 157a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="#7DD3FC" stroke-width="2"/><text x="92" y="169" fill="#E0F2FE" font-size="16" font-weight="700">访客</text>
    <rect x="220" y="130" width="160" height="66" rx="17" fill="url(#endpoint)" stroke="#38BDF8" stroke-opacity=".65"/><text x="300" y="158" text-anchor="middle" fill="#E0F2FE" font-size="15" font-weight="700">公开问答接口</text><text x="300" y="179" text-anchor="middle" fill="#7DD3FC" font-size="12">POST + SSE</text>
    <rect x="420" y="130" width="160" height="66" rx="17" fill="#3B2518" stroke="#FB923C" stroke-opacity=".62"/><text x="500" y="158" text-anchor="middle" fill="#FFF7ED" font-size="15" font-weight="700">前置检查</text><text x="500" y="179" text-anchor="middle" fill="#FDBA74" font-size="12">开关 · 参数 · 限流</text>
    <rect x="620" y="130" width="160" height="66" rx="17" fill="url(#core)" stroke="#818CF8" stroke-opacity=".72"/><text x="700" y="158" text-anchor="middle" fill="white" font-size="15" font-weight="700">对话编排服务</text><text x="700" y="179" text-anchor="middle" fill="#C7D2FE" font-size="11">ChatService</text>
    <rect x="820" y="130" width="170" height="66" rx="17" fill="#251B4B" stroke="#A78BFA" stroke-opacity=".65"/><text x="905" y="158" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">路由解析</text><text x="905" y="179" text-anchor="middle" fill="#C4B5FD" font-size="12">指定路由 / 自动检测</text>
    <rect x="1030" y="130" width="170" height="66" rx="17" fill="#3A2416" stroke="#FB923C" stroke-opacity=".68"/><text x="1115" y="158" text-anchor="middle" fill="#FFF7ED" font-size="15" font-weight="700">意图处理管线</text><text x="1115" y="179" text-anchor="middle" fill="#FDBA74" font-size="11">Pipeline · 实时 Halo 数据</text>
    <rect x="1240" y="130" width="160" height="66" rx="17" fill="#17234D" stroke="#818CF8" stroke-opacity=".62"/><text x="1320" y="158" text-anchor="middle" fill="#EEF2FF" font-size="15" font-weight="700">RAG 检索管线</text><text x="1320" y="179" text-anchor="middle" fill="#A5B4FC" font-size="11">检索与上下文</text>
    <rect x="1440" y="130" width="120" height="66" rx="17" fill="#332044" stroke="#C084FC" stroke-opacity=".65"/><text x="1500" y="155" text-anchor="middle" fill="#FAF5FF" font-size="12" font-weight="700">AI Foundation</text><text x="1500" y="176" text-anchor="middle" fill="#D8B4FE" font-size="11">对话模型网关</text>
  </g>

  <!-- 生命线 -->
  <g stroke="#64748B" stroke-opacity=".5" stroke-width="1.5" stroke-dasharray="6 7"><path d="M110 196V842"/><path d="M300 196V842"/><path d="M500 196V842"/><path d="M700 196V842"/><path d="M905 196V842"/><path d="M1115 196V720"/><path d="M1320 196V720"/><path d="M1500 196V720"/></g>

  <!-- 入口与检查 -->
  <g font-family="Inter, PingFang SC, sans-serif">
    <circle cx="70" cy="238" r="14" fill="#0EA5E9"/><text x="70" y="242" text-anchor="middle" fill="white" font-size="12" font-weight="700">1</text>
    <path d="M110 238H298" stroke="#60A5FA" stroke-width="2.2" marker-end="url(#blue)"/><text x="135" y="228" fill="#BAE6FD" font-size="13">POST /chat/stream</text><text x="135" y="252" fill="#64748B" font-size="11">message · history · intentRouteId · reasoningEnabled</text>
    <circle cx="460" cy="292" r="14" fill="#FB923C"/><text x="460" y="296" text-anchor="middle" fill="white" font-size="12" font-weight="700">2</text>
    <path d="M300 292H498" stroke="#FB923C" stroke-width="2.2" marker-end="url(#orange)"/><text x="325" y="282" fill="#FED7AA" font-size="13">访客开关 · 参数校验 · IP 限流</text>
    <path d="M500 320H302" stroke="#34D399" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#green)"/><text x="390" y="313" fill="#6EE7B7" font-size="12">允许请求并解析推理模式</text>
    <circle cx="660" cy="354" r="14" fill="#6366F1"/><text x="660" y="358" text-anchor="middle" fill="white" font-size="12" font-weight="700">3</text>
    <path d="M300 354H698" stroke="#60A5FA" stroke-width="2.2" marker-end="url(#blue)"/><text x="430" y="344" fill="#BAE6FD" font-size="13">进入对话编排</text>
    <circle cx="865" cy="404" r="14" fill="#8B5CF6"/><text x="865" y="408" text-anchor="middle" fill="white" font-size="12" font-weight="700">4</text>
    <path d="M700 404H903" stroke="#A78BFA" stroke-width="2.2" marker-end="url(#purple)"/><text x="727" y="394" fill="#C4B5FD" font-size="13">快捷路由优先，否则自动识别意图</text>
  </g>

  <!-- 双路径 -->
  <rect x="640" y="434" width="900" height="286" rx="21" fill="#0F172A" fill-opacity=".7" stroke="#818CF8" stroke-opacity=".55"/>
  <path d="M640 476H1540" stroke="#475569"/>
  <rect x="640" y="434" width="230" height="30" rx="15" fill="#312E81"/><text x="755" y="454" text-anchor="middle" fill="#E0E7FF" font-family="Inter, PingFang SC, sans-serif" font-size="12" font-weight="750">ALT · 意图 / RAG 双路径</text>

  <g font-family="Inter, PingFang SC, sans-serif">
    <rect x="662" y="488" width="174" height="24" rx="12" fill="#FB923C" fill-opacity=".18"/><text x="749" y="505" text-anchor="middle" fill="#FDBA74" font-size="12" font-weight="700">指定或自动命中意图</text>
    <path d="M905 532H1113" stroke="#FB923C" stroke-width="2.2" marker-end="url(#orange)"/><text x="944" y="523" fill="#FDBA74" font-size="12">执行处理器链（PipelineExecutor）</text>
    <rect x="1042" y="548" width="146" height="48" rx="13" fill="#3A2416" stroke="#FB923C" stroke-opacity=".58"/><text x="1115" y="569" text-anchor="middle" fill="#FFF7ED" font-size="12" font-weight="700">公开文章筛选 / 排序</text><text x="1115" y="586" text-anchor="middle" fill="#FDBA74" font-size="11">不调用回答模型</text>
    <path d="M1115 606C1040 626 840 626 702 606" stroke="#34D399" stroke-width="2.2" marker-end="url(#green)"/><text x="793" y="618" fill="#6EE7B7" font-size="12">确定性导语 · 引用 · 文章卡片</text>

    <rect x="662" y="638" width="112" height="24" rx="12" fill="#0EA5E9" fill-opacity=".2"/><text x="718" y="655" text-anchor="middle" fill="#7DD3FC" font-size="12" font-weight="700">未命中意图</text>
    <path d="M905 680H1318" stroke="#60A5FA" stroke-width="2.2" marker-end="url(#blue)"/><text x="1032" y="671" fill="#7DD3FC" font-size="12">增强检索 · 构建上下文与引用</text>
    <path d="M1320 694H1498" stroke="#A78BFA" stroke-width="2.2" marker-end="url(#purple)"/><text x="1340" y="686" fill="#C4B5FD" font-size="12">调用模型网关（LlmClient）</text>
    <path d="M1500 710H1322" stroke="#34D399" stroke-width="2.2" marker-end="url(#green)"/><text x="1350" y="702" fill="#6EE7B7" font-size="12">回答片段 / 推理过程</text>
  </g>

  <!-- 输出与记录 -->
  <g font-family="Inter, PingFang SC, sans-serif">
    <path d="M1320 744C1120 760 900 760 702 744" stroke="#34D399" stroke-width="2.2" marker-end="url(#green)"/><text x="940" y="751" fill="#6EE7B7" font-size="12">引用 · 事件流 · 调试链路</text>
    <path d="M700 776H302" stroke="#34D399" stroke-width="2.3" marker-end="url(#green)"/><text x="430" y="766" fill="#6EE7B7" font-size="13">返回统一问答响应</text>
    <path d="M300 812H112" stroke="#34D399" stroke-width="2.3" marker-end="url(#green)"/><text x="82" y="794" fill="#A7F3D0" font-size="12">SSE 顺序</text><text x="330" y="806" fill="#A7F3D0" font-size="12">引用（citations）→ 卡片（structured_result）→ 推理 / 回答 → 日志编号 → 结束</text>
    <rect x="930" y="816" width="570" height="50" rx="15" fill="#0B3B36" stroke="#34D399" stroke-opacity=".62"/><text x="954" y="837" fill="#ECFDF5" font-size="13" font-weight="700">异步观测收口</text><text x="954" y="857" fill="#6EE7B7" font-size="11">暂存调试链路（TraceCache）· 写入问答日志（ChatLog）· 后续回写反馈</text>
    <path d="M300 840H928" stroke="#34D399" stroke-width="1.8" stroke-dasharray="7 6" marker-end="url(#green)"/>
  </g>
</svg>
