apiVersion: v1alpha1
kind: Role
metadata:
  name: ai-suite-role-template-anonymous-public
  labels:
    halo.run/role-template: "true"
    halo.run/hidden: "true"
    rbac.authorization.halo.run/aggregate-to-anonymous: "true"
  annotations:
    rbac.authorization.halo.run/module: "AI智能套件"
    rbac.authorization.halo.run/display-name: "AI智能套件公开接口"
rules:
  - apiGroups: ["api.ai-suite.halo.run"]
    resources:
      - widget-config
      - chat
      - chat/stream
      - chat/feedback
      - search
      - search/results
      - search/halo-results
      - search/answer
      - mindmap
    verbs: ["get", "list", "create"]
  # Halo 2.24 会把 POST /资源/名称（/chat/stream）解析为 non-resource request。
  # 精确授权该 URL，不扩大其他公开端点权限。
  - nonResourceURLs:
      - /apis/api.ai-suite.halo.run/v1alpha1/chat/stream
    verbs: ["create"]
