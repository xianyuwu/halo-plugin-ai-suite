<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="AI 智能套件">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <!-- 圆角渐变背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- 天线 -->
  <line x1="64" y1="30" x2="64" y2="42" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="64" cy="27" r="5.5" fill="#fde047"/>

  <!-- 机器人头部 -->
  <rect x="36" y="42" width="56" height="46" rx="13" fill="url(#face)"/>

  <!-- 眼睛 -->
  <circle cx="54" cy="62" r="5.5" fill="#3b82f6"/>
  <circle cx="74" cy="62" r="5.5" fill="#3b82f6"/>

  <!-- 对话三点（智能问答） -->
  <circle cx="54" cy="76" r="2.6" fill="#7c3aed"/>
  <circle cx="64" cy="76" r="2.6" fill="#7c3aed"/>
  <circle cx="74" cy="76" r="2.6" fill="#7c3aed"/>

  <!-- 颈部 + 身体 -->
  <rect x="60" y="88" width="8" height="6" fill="#ffffff" opacity="0.9"/>
  <rect x="46" y="94" width="36" height="10" rx="5" fill="#ffffff" opacity="0.92"/>

  <!-- AI 闪光 -->
  <path d="M28 30 l2.2 5.8 l5.8 2.2 l-5.8 2.2 l-2.2 5.8 l-2.2 -5.8 l-5.8 -2.2 l5.8 -2.2 z" fill="#fde047"/>
  <path d="M102 44 l1.6 4.2 l4.2 1.6 l-4.2 1.6 l-1.6 4.2 l-1.6 -4.2 l-4.2 -1.6 l4.2 -1.6 z" fill="#fde047" opacity="0.85"/>
  <path d="M104 96 l1.3 3.4 l3.4 1.3 l-3.4 1.3 l-1.3 3.4 l-1.3 -3.4 l-3.4 -1.3 l3.4 -1.3 z" fill="#ffffff" opacity="0.7"/>
</svg>
