264" width="84" height="22" rx="11" fill="#0B1220"/><text x="1005" y="279" text-anchor="middle" fill="#BFDBFE" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">开始流式问答</text><path d="M1310 358H708" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="941" y="328" width="128" height="22" rx="11" fill="#0B1220"/><text x="1005" y="343" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">引用 + 结构化结果 + token</text><path d="M700 422H98" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="325" y="392" width="140" height="22" rx="11" fill="#0B1220"/><text x="395" y="407" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">event: citations（可选）</text><path d="M700 486H98" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="301" y="456" width="188" height="22" rx="11" fill="#0B1220"/><text x="395" y="471" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">event: structured_result（可选）</text><path d="M700 550H98" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="319" y="520" width="152" height="22" rx="11" fill="#0B1220"/><text x="395" y="535" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">data: {content: token}</text><path d="M700 614H98" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="349" y="584" width="92" height="22" rx="11" fill="#0B1220"/><text x="395" y="599" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">event: logId</text><path d="M700 678H98" stroke="#FB923C" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowOrange)"/><rect x="349" y="648" width="92" height="22" rx="11" fill="#0B1220