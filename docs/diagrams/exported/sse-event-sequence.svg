  </defs>
  <rect width="1400" height="680" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="680" rx="28" fill="url(#grid)"/>
  <text x="52" y="58" fill="#F8FAFC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="760">访客聊天 SSE 事件顺序</text>
