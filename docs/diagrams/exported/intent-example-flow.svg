<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc" preserveAspectRatio="xMidYMid meet">
  <title id="diagram-title">意图路由示例</title>
  <desc id="diagram-desc">“最近有哪些 AI 文章？”从规则命中到自然语言回答</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111F"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#C7D2FE" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".38"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#60A5FA"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#34D399"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FB923C"/></marker>
  </defs>
  <rect width="1400" height="430" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="430" rx="28" fill="url(#grid)"/>
  <text x="52" y="58" fill="#F8FAFC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="760">意图路由示例</text>
  <text x="52" y="88" fill="#94A3B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">“最近有哪些 AI 文章？”从规则命中到自然语言回答</text>
  <path d="M265 210 C285 210,285 210,305 210" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  
<path d="M515 210 C535 210,535 210,555 210" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  
<path d="M765 210 C785 210,785 210,805 210" stroke="#FB923C" stroke-width="2.2" fill="none" marker-end="url(#arrowOrange)"/>
  
<path d="M1015 210 C1035 210,1035 210,1055 210" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  
<path d="M1215 210 C1235 210,1235 210,1255 210" stroke="#34D399" stroke-width="2.2" fill="none" marker-end="url(#arrowGreen)"/>
  
<g filter="url(#shadow)">
    <rect x="45" y="165" width="220" height="90" rx="18" fill="#0D2A47" stroke="#38BDF8" stroke-opacity=".68"/>
    
    <text x="155" y="208" text-anchor="middle" fill="#E0F2FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">用户问题</text>
    <text x="155" y="234" text-anchor="middle" fill="#7DD3FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">最近有哪些 AI 文章？</text>
  </g>
<g filter="url(#shadow)">
    <rect x="305" y="165" width="210" height="90" rx="18" fill="#1E2455" stroke="#818CF8" stroke-opacity=".68"/>
    
    <text x="410" y="208" text-anchor="middle" fill="#EEF2FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">触发规则</text>
    <text x="410" y="234" text-anchor="middle" fill="#A5B4FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">命中最新文章意图</text>
  </g>
<g filter="url(#shadow)">
    <rect x="555" y="165" width="210" height="90" rx="18" fill="#2D1D46" stroke="#C084FC" stroke-opacity=".68"/>
    
    <text x="660" y="208" text-anchor="middle" fill="#FAF5FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">TOPIC_MATCH</text>
    <text x="660" y="234" text-anchor="middle" fill="#D8B4FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">筛出 AI 主题文章</text>
  </g>
<g filter="url(#shadow)">
    <rect x="805" y="165" width="210" height="90" rx="18" fill="#3A2416" stroke="#FB923C" stroke-opacity=".68"/>
    
    <text x="910" y="208" text-anchor="middle" fill="#FFF7ED" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">TIME_SORT</text>
    <text x="910" y="234" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">发布时间倒序</text>
  </g>
<g filter="url(#shadow)">
    <rect x="1055" y="165" width="160" height="90" rx="18" fill="#2D1D46" stroke="#C084FC" stroke-opacity=".68"/>
    
    <text x="1135" y="208" text-anchor="middle" fill="#FAF5FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">LLM</text>
    <text x="1135" y="234" text-anchor="middle" fill="#D8B4FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">组织回答</text>
  </g>
<g filter="url(#shadow)">
    <rect x="1255" y="165" width="110" height="90" rx="18" fill="#0B352F" stroke="#34D399" stroke-opacity=".68"/>
    
    <text x="1310" y="208" text-anchor="middle" fill="#ECFDF5" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">结果</text>
    <text x="1310" y="234" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">文字 + 引用</text>
  </g>
  <text x="1348" y="405" text-anchor="end" fill="#64748B" font-family="Inter, PingFang SC, sans-serif" font-size="11">AI 智能套件 · 0.3.0</text>
</svg>