<svg width="1400" height="680" viewBox="0 0 1400 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc" preserveAspectRatio="xMidYMid meet">
  <title id="diagram-title">意图检测过程</title>
  <desc id="diagram-desc">启用路由按优先级排序并缓存 30 秒；失败或超时始终回到 RAG</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111F"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#C7D2FE" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".38"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#60A5FA"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#34D399"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FB923C"/></marker>
  </defs>
  <rect width="1400" height="680" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="680" rx="28" fill="url(#grid)"/>
  <text x="52" y="58" fill="#F8FAFC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="760">意图检测过程</text>
  <text x="52" y="88" fill="#94A3B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">启用路由按优先级排序并缓存 30 秒；失败或超时始终回到 RAG</text>
  <path d="M240 296 C265 296,265 296,290 296" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  
<path d="M510 296 C535 296,535 296,560 296" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  
<path d="M780 296 C940 296,940 186,1100 186" stroke="#34D399" stroke-width="2.2" fill="none" marker-end="url(#arrowGreen)"/>
  <rect x="912" y="217" width="56" height="22" rx="11" fill="#0B1220" stroke="#34D399" stroke-opacity=".35"/><text x="940" y="232" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11">命中</text>
<path d="M670 337 C670 373.5,580 373.5,580 410" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <rect x="597" y="350.5" width="56" height="22" rx="11" fill="#0B1220" stroke="#60A5FA" stroke-opacity=".35"/><text x="625" y="365.5" text-anchor="middle" fill="#93C5FD" font-family="Inter, PingFang SC, sans-serif" font-size="11">未命中</text>
<path d="M690 451 C740 451,740 451,790 451" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <rect x="712" y="427" width="56" height="22" rx="11" fill="#0B1220" stroke="#60A5FA" stroke-opacity=".35"/><text x="740" y="442" text-anchor="middle" fill="#93C5FD" font-family="Inter, PingFang SC, sans-serif" font-size="11">有</text>
<path d="M580 492 C580 523.5,745 523.5,745 555" stroke="#FB923C" stroke-width="2.2" fill="none" marker-end="url(#arrowOrange)"/>
  <rect x="634.5" y="500.5" width="56" height="22" rx="11" fill="#0B1220" stroke="#FB923C" stroke-opacity=".35"/><text x="662.5" y="515.5" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, sans-serif" font-size="11">没有</text>
<path d="M1010 451 C1055 451,1055 186,1100 186" stroke="#34D399" stroke-width="2.2" fill="none" marker-end="url(#arrowGreen)"/>
  <rect x="1027" y="294.5" width="56" height="22" rx="11" fill="#0B1220" stroke="#34D399" stroke-opacity=".35"/><text x="1055" y="309.5" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11">有效 ID</text>
<path d="M900 492 C900 523.5,745 523.5,745 555" stroke="#FB923C" stroke-width="2.2" fill="none" marker-end="url(#arrowOrange)"/>
  <rect x="783" y="500.5" width="79" height="22" rx="11" fill="#0B1220" stroke="#FB923C" stroke-opacity=".35"/><text x="822.5" y="515.5" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, sans-serif" font-size="11">失败 / none</text>
<g filter="url(#shadow)">
    <rect x="60" y="255" width="180" height="82" rx="18" fill="#0D2A47" stroke="#38BDF8" stroke-opacity=".68"/>
    
    <text x="150" y="294" text-anchor="middle" fill="#E0F2FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">用户问题</text>
    <text x="150" y="320" text-anchor="middle" fill="#7DD3FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">非空 Query</text>
  </g>
<g filter="url(#shadow)">
    <rect x="290" y="255" width="220" height="82" rx="18" fill="#172033" stroke="#64748B" stroke-opacity=".68"/>
    
    <text x="400" y="294" text-anchor="middle" fill="#F1F5F9" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">加载启用路由</text>
    <text x="400" y="320" text-anchor="middle" fill="#94A3B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">优先级降序 · 30s 缓存</text>
  </g>
<g filter="url(#shadow)">
    <rect x="560" y="255" width="220" height="82" rx="22" fill="#1E2455" stroke="#818CF8" stroke-opacity=".68"/>
    
    <text x="670" y="294" text-anchor="middle" fill="#EEF2FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">正则是否命中？</text>
    <text x="670" y="320" text-anchor="middle" fill="#A5B4FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">CASE_INSENSITIVE + find</text>
  </g>
<g filter="url(#shadow)">
    <rect x="1100" y="145" width="230" height="82" rx="18" fill="#0B352F" stroke="#34D399" stroke-opacity=".68"/>
    
    <text x="1215" y="184" text-anchor="middle" fill="#ECFDF5" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">返回路由</text>
    <text x="1215" y="210" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">进入 Pipeline</text>
  </g>
<g filter="url(#shadow)">
    <rect x="470" y="410" width="220" height="82" rx="22" fill="#1E2455" stroke="#818CF8" stroke-opacity=".68"/>
    
    <text x="580" y="449" text-anchor="middle" fill="#EEF2FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">有 LLM 兜底？</text>
    <text x="580" y="475" text-anchor="middle" fill="#A5B4FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">llmFallback=true</text>
  </g>
<g filter="url(#shadow)">
    <rect x="790" y="410" width="220" height="82" rx="18" fill="#2D1D46" stroke="#C084FC" stroke-opacity=".68"/>
    
    <text x="900" y="449" text-anchor="middle" fill="#FAF5FF" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">LLM 意图分类</text>
    <text x="900" y="475" text-anchor="middle" fill="#D8B4FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">2 秒超时</text>
  </g>
<g filter="url(#shadow)">
    <rect x="630" y="555" width="230" height="82" rx="18" fill="#3A2416" stroke="#FB923C" stroke-opacity=".68"/>
    
    <text x="745" y="594" text-anchor="middle" fill="#FFF7ED" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">返回 empty</text>
    <text x="745" y="620" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">进入默认 RAG</text>
  </g>
  <text x="1348" y="655" text-anchor="end" fill="#64748B" font-family="Inter, PingFang SC, sans-serif" font-size="11">AI 智能套件 · 0.2.23</text>
</svg>