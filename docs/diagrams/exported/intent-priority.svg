<svg width="1400" height="500" viewBox="0 0 1400 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc" preserveAspectRatio="xMidYMid meet">
  <title id="diagram-title">意图优先级设计</title>
  <desc id="diagram-desc">具体路由先于通用路由，宽泛兜底放在最后，避免通用规则截胡</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111F"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#C7D2FE" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".38"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#60A5FA"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#34D399"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FB923C"/></marker>
  </defs>
  <rect width="1400" height="500" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="500" rx="28" fill="url(#grid)"/>
  <text x="52" y="58" fill="#F8FAFC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="760">意图优先级设计</text>
  <text x="52" y="88" fill="#94A3B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">具体路由先于通用路由，宽泛兜底放在最后，避免通用规则截胡</text>
  <path d="M410 181 C472.5 181,472.5 261,535 261" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <rect x="443.5" y="197" width="58" height="22" rx="11" fill="#0B1220" stroke="#60A5FA" stroke-opacity=".35"/><text x="472.5" y="212" text-anchor="middle" fill="#93C5FD" font-family="Inter, PingFang SC, sans-serif" font-size="11">未命中再继续</text>
<path d="M865 261 C927.5 261,927.5 341,990 341" stroke="#60A5FA" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <rect x="899.5" y="277" width="56" height="22" rx="11" fill="#0B1220" stroke="#60A5FA" stroke-opacity=".35"/><text x="927.5" y="292" text-anchor="middle" fill="#93C5FD" font-family="Inter, PingFang SC, sans-serif" font-size="11">仍未命中</text>
<g filter="url(#shadow)">
    <rect x="80" y="140" width="330" height="82" rx="18" fill="#0B352F" stroke="#34D399" stroke-opacity=".68"/>
    <rect x="98" y="154" width="65" height="22" rx="11" fill="#34D399" fill-opacity=".16"/><text x="109" y="170" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="10" font-weight="750" letter-spacing=".7">FIRST</text>
    <text x="245" y="191" text-anchor="middle" fill="#ECFDF5" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">具体业务意图</text>
    <text x="245" y="217" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">Java 入门教程 · priority 200</text>
  </g>
<g filter="url(#shadow)">
    <rect x="535" y="220" width="330" height="82" rx="18" fill="#0D2A47" stroke="#38BDF8" stroke-opacity=".68"/>
    <rect x="553" y="234" width="74" height="22" rx="11" fill="#38BDF8" fill-opacity=".16"/><text x="564" y="250" fill="#7DD3FC" font-family="Inter, PingFang SC, sans-serif" font-size="10" font-weight="750" letter-spacing=".7">SECOND</text>
    <text x="700" y="271" text-anchor="middle" fill="#E0F2FE" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">通用结构化意图</text>
    <text x="700" y="297" text-anchor="middle" fill="#7DD3FC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">按标签查询 · priority 100</text>
  </g>
<g filter="url(#shadow)">
    <rect x="990" y="300" width="330" height="82" rx="18" fill="#3A2416" stroke="#FB923C" stroke-opacity=".68"/>
    <rect x="1008" y="314" width="62" height="22" rx="11" fill="#FB923C" fill-opacity=".16"/><text x="1019" y="330" fill="#FDBA74" font-family="Inter, PingFang SC, sans-serif" font-size="10" font-weight="750" letter-spacing=".7">LAST</text>
    <text x="1155" y="351" text-anchor="middle" fill="#FFF7ED" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="720">宽泛兜底意图</text>
    <text x="1155" y="377" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="12.5">语义分类 · priority 0</text>
  </g>
<text x="80" y="430" fill="#CBD5E1" font-family="Inter, PingFang SC, sans-serif" font-size="14">规则：越具体、误判成本越高的路由，优先级越高；最终仍未命中则进入 RAG。</text>
  <text x="1348" y="475" text-anchor="end" fill="#64748B" font-family="Inter, PingFang SC, sans-serif" font-size="11">AI 智能套件 · 0.3.0</text>
</svg>