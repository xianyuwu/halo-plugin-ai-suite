  <path d="M716 764H314" stroke="#34D399" stroke-width="2.3" marker-end="url(#green)"/><text x="432" y="754" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="13">统一 ChatResponse</text>
  <path d="M312 798H122" stroke="#34D399" stroke-width="2.3" marker-end="url(#green)"/><text x="146" y="788" fill="#A7F3D0" font-family="Inter, PingFang SC, sans-serif" font-size="13">SSE · citations · token · logId · [DONE]</text>
