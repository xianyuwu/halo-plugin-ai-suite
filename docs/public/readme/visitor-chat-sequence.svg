  <g transform="translate(1210 55)" font-family="Inter, PingFang SC, sans-serif"><circle cx="5" cy="5" r="5" fill="#60A5FA"/><text x="18" y="10" fill="#CBD5E1" font-size="13">请求</text><circle cx="91" cy="5" r="5" fill="#A78BFA"/><text x="104" y="10" fill="#CBD5E1" font-size="13">AI 编排</text><circle cx="202" cy="5" r="5" fill="#34D399"/><text x="215" y="10" fill="#CBD5E1" font-size="13">响应 / 记录</text></g>

