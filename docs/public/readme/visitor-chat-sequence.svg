    <rect x="48" y="130" width="144" height="66" rx="17" fill="#102A43" stroke="#38BDF8" stroke-opacity=".6"/><circle cx="78" cy="163" r="14" fill="#38BDF8" fill-opacity=".18"/><path d="M72 167c3-6 9-6 12 0M78 157a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="#7DD3FC" stroke-width="2"/><text x="101" y="169" fill="#E0F2FE" font-size="16" font-weight="700">访客</text>
