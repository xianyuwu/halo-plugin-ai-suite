  <path d="M312 292H512" stroke="#FB923C" stroke-width="2.2" marker-end="url(#orange)"/><text x="337" y="282" fill="#FED7AA" font-family="Inter, PingFang SC, sans-serif" font-size="13">功能开关 · IP 限流 · 模型额度</text>
