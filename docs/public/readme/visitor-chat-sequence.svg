    <rect x="1038" y="130" width="164" height="66" rx="17" fill="#17234D" stroke="#818CF8" stroke-opacity=".62"/><text x="1120" y="158" text-anchor="middle" fill="#EEF2FF" font-size="15" font-weight="700">检索分支</text><text x="1120" y="179" text-anchor="middle" fill="#A5B4FC" font-size="12">Intent / RAG</text>
