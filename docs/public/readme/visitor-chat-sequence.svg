  <path d="M312 346H714" stroke="#60A5FA" stroke-width="2.2" marker-end="url(#blue)"/><text x="430" y="336" fill="#BAE6FD" font-family="Inter, PingFang SC, sans-serif" font-size="13">chatStreamWithCitations(...)</text>
