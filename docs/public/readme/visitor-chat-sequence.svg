  <rect width="1600" height="900" rx="32" fill="url(#bg)"/><rect width="1600" height="900" rx="32" fill="url(#grid)"/>
  <text x="64" y="66" fill="#F8FAFC" font-family="Inter, PingFang SC, sans-serif" font-size="30" font-weight="760">一次访客问答如何流转</text>
