  <path d="M918 654H1118" stroke="#60A5FA" stroke-width="2.2" marker-end="url(#blue)"/><text x="951" y="646" fill="#7DD3FC" font-family="Inter, PingFang SC, sans-serif" font-size="12">RAGPipeline</text>
  <path d="M1120 670H1310" stroke="#A78BFA" stroke-width="2.2" marker-end="url(#purple)"/><text x="1140" y="663" fill="#C4B5FD" font-family="Inter, PingFang SC, sans-serif" font-size="12">Top-N 上下文 + 引用</text>

