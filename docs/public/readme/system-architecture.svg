    <rect x="64" y="230" width="340" height="92" rx="18" fill="#0F2942" stroke="#0EA5E9" stroke-opacity=".65"/><rect x="82" y="249" width="46" height="46" rx="13" fill="#0EA5E9" fill-opacity=".17"/><path d="M94 260h22v17h-13l-6 6v-6h-3z" stroke="#7DD3FC" stroke-width="2"/><text x="146" y="263" fill="#F0F9FF" font-size="19" font-weight="700">Halo 主题前台</text><text x="146" y="288" fill="#7DD3FC" font-size="14">智能问答 · AI 搜索 · 文章脑图</text>
    <rect x="430" y="230" width="340" height="92" rx="18" fill="#171E4A" stroke="#6366F1" stroke-opacity=".7"/><rect x="448" y="249" width="46" height="46" rx="13" fill="#6366F1" fill-opacity=".2"/><path d="M459 261h24v19h-24zM459 266h24" stroke="#A5B4FC" stroke-width="2"/><text x="512" y="263" fill="#EEF2FF" font-size="19" font-weight="700">Halo Console</text><text x="512" y="288" fill="#A5B4FC" font-size="14">配置 · 索引 · 评测 · 运营管理</text>
