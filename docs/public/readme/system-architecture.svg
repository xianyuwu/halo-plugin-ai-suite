    <rect x="1210" y="694" width="296" height="104" rx="18" fill="#34203A" stroke="#D946EF" stroke-opacity=".5"/><circle cx="1244" cy="731" r="17" fill="#D946EF" fill-opacity=".17"/><path d="M1237 737l5-7 5 3 5-9" stroke="#F0ABFC" stroke-width="2"/><text x="1273" y="730" fill="#FDF4FF" font-size="17" font-weight="700">重排序模型（Rerank）</text><text x="1273" y="756" fill="#F0ABFC" font-size="13">候选文档语义精排</text>
