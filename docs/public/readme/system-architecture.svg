    <rect x="442" y="530" width="314" height="82" rx="18" fill="#1E1B4B" fill-opacity=".78" stroke="#818CF8" stroke-opacity=".6"/><text x="464" y="560" fill="#EEF2FF" font-size="18" font-weight="700">内容智能</text><text x="464" y="588" fill="#A5B4FC" font-size="14">写作辅助 · AI 摘要 · 脑图 · 大纲</text>
