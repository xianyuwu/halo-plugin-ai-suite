    <rect x="490" y="116" width="235" height="58" rx="29" fill="#1E293B" stroke="#475569"/><circle cx="524" cy="145" r="14" fill="#C084FC" fill-opacity=".15"/><path d="M517 151l5-6 5 3 6-9M517 153h16" stroke="#D8B4FE" stroke-width="2"/><text x="551" y="151" fill="#E2E8F0" font-size="17" font-weight="650">站长 / 运营者</text>
    <rect x="832" y="116" width="235" height="58" rx="29" fill="#1E293B" stroke="#475569"/><circle cx="866" cy="145" r="14" fill="#818CF8" fill-opacity=".15"/><path d="M860 151h12M862 136h8v15h-8z" stroke="#A5B4FC" stroke-width="2"/><text x="893" y="151" fill="#E2E8F0" font-size="17" font-weight="650">作者 / 编辑</text>
  </g>

