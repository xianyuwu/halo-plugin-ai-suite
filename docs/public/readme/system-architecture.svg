<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AI 智能套件系统全景架构</title>
  <desc>展示使用角色、体验入口、API 权限边界、业务能力、意图与 RAG 双路径编排、共享基础能力、Halo AI Foundation 模型网关，以及持久化、可重建和运行时数据。</desc>
  <defs>
    <linearGradient id="canvas" x1="70" y1="20" x2="1530" y2="1080" gradientUnits="userSpaceOnUse"><stop stop-color="#0B1220"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <linearGradient id="plugin" x1="64" y1="340" x2="1136" y2="940" gradientUnits="userSpaceOnUse"><stop stop-color="#172554" stop-opacity=".72"/><stop offset="1" stop-color="#312E81" stop-opacity=".38"/></linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="core" x1="94" y1="624" x2="1104" y2="744" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset=".52" stop-color="#4F46E5"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" stroke="#C7D2FE" stroke-opacity=".04"/></pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity=".32"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10Z" fill="#60A5FA"/></marker>
    <marker id="purpleArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10Z" fill="#A78BFA"/></marker>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10Z" fill="#34D399"/></marker>
  </defs>

  <rect width="1600" height="1100" rx="32" fill="url(#canvas)"/><rect width="1600" height="1100" rx="32" fill="url(#grid)"/>
  <circle cx="1300" cy="120" r="220" fill="#7C3AED" fill-opacity=".08" filter="url(#glow)"/><circle cx="210" cy="1010" r="250" fill="#0284C7" fill-opacity=".06" filter="url(#glow)"/>

