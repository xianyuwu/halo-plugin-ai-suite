  <rect x="84" y="337" width="264" height="34" rx="17" fill="#312E81" stroke="#818CF8"/><text x="103" y="359" fill="#E0E7FF" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">AI 智能套件 · Halo JVM</text>
