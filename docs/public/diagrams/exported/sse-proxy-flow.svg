<svg width="1400" height="650" viewBox="0 0 1400 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc" preserveAspectRatio="xMidYMid meet">
  <title id="diagram-title">SSE 穿过反向代理</title>
  <desc id="diagram-desc">每一帧必须立即向浏览器转发，任何一层聚合都会造成“最后一次性显示”</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111F"/><stop offset=".55" stop-color="#111C35"/><stop offset="1" stop-color="#17143A"/></linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#C7D2FE" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".38"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#60A5FA"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#34D399"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FB923C"/></marker>
  </defs>
  <rect width="1400" height="650" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="650" rx="28" fill="url(#grid)"/>
  <text x="52" y="58" fill="#F8FAFC" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="760">SSE 穿过反向代理</text>
  <text x="52" y="88" fill="#94A3B8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">每一帧必须立即向浏览器转发，任何一层聚合都会造成“最后一次性显示”</text>
  <g filter="url(#shadow)"><rect x="-2" y="122" width="184" height="64" rx="17" fill="#0D2A47" stroke="#38BDF8" stroke-opacity=".7"/><text x="90" y="151" text-anchor="middle" fill="#E0F2FE" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="720">浏览器</text><text x="90" y="172" text-anchor="middle" fill="#7DD3FC" font-family="Inter, PingFang SC, sans-serif" font-size="11">fetch stream</text></g><path d="M90 186V580" stroke="#38BDF8" stroke-opacity=".28" stroke-width="1.5" stroke-dasharray="6 7"/><g filter="url(#shadow)"><rect x="404.6666666666667" y="122" width="184" height="64" rx="17" fill="#3A2416" stroke="#FB923C" stroke-opacity=".7"/><text x="496.6666666666667" y="151" text-anchor="middle" fill="#FFF7ED" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="720">Nginx / CDN</text><text x="496.6666666666667" y="172" text-anchor="middle" fill="#FDBA74" font-family="Inter, PingFang SC, sans-serif" font-size="11">禁止缓冲</text></g><path d="M496.6666666666667 186V580" stroke="#FB923C" stroke-opacity=".28" stroke-width="1.5" stroke-dasharray="6 7"/><g filter="url(#shadow)"><rect x="811.3333333333334" y="122" width="184" height="64" rx="17" fill="#1E2455" stroke="#818CF8" stroke-opacity=".7"/><text x="903.3333333333334" y="151" text-anchor="middle" fill="#EEF2FF" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="720">Halo 插件</text><text x="903.3333333333334" y="172" text-anchor="middle" fill="#A5B4FC" font-family="Inter, PingFang SC, sans-serif" font-size="11">SSE Endpoint</text></g><path d="M903.3333333333334 186V580" stroke="#818CF8" stroke-opacity=".28" stroke-width="1.5" stroke-dasharray="6 7"/><g filter="url(#shadow)"><rect x="1218" y="122" width="184" height="64" rx="17" fill="#2D1D46" stroke="#C084FC" stroke-opacity=".7"/><text x="1310" y="151" text-anchor="middle" fill="#FAF5FF" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="720">模型服务</text><text x="1310" y="172" text-anchor="middle" fill="#D8B4FE" font-family="Inter, PingFang SC, sans-serif" font-size="11">stream=true</text></g><path d="M1310 186V580" stroke="#C084FC" stroke-opacity=".28" stroke-width="1.5" stroke-dasharray="6 7"/><path d="M90 230H488.6666666666667" stroke="#60A5FA" stroke-width="2"  marker-end="url(#arrow)"/><rect x="232.33333333333337" y="200" width="122" height="22" rx="11" fill="#0B1220"/><text x="293.33333333333337" y="215" text-anchor="middle" fill="#BFDBFE" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">POST /chat/stream</text><path d="M496.6666666666667 285H895.3333333333334" stroke="#60A5FA" stroke-width="2"  marker-end="url(#arrow)"/><rect x="654" y="255" width="92" height="22" rx="11" fill="#0B1220"/><text x="700" y="270" text-anchor="middle" fill="#BFDBFE" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">转发 JSON body</text><path d="M903.3333333333334 340H1302" stroke="#60A5FA" stroke-width="2"  marker-end="url(#arrow)"/><rect x="1027.6666666666667" y="310" width="158" height="22" rx="11" fill="#0B1220"/><text x="1106.6666666666667" y="325" text-anchor="middle" fill="#BFDBFE" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">Chat Completions stream</text><path d="M1310 395H911.3333333333334" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="1060.6666666666667" y="365" width="92" height="22" rx="11" fill="#0B1220"/><text x="1106.6666666666667" y="380" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">token chunks</text><path d="M903.3333333333334 450H504.6666666666667" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="594" y="420" width="212" height="22" rx="11" fill="#0B1220"/><text x="700" y="435" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">citations / token / logId / DONE</text><path d="M496.6666666666667 505H98" stroke="#34D399" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><rect x="251.33333333333337" y="475" width="84" height="22" rx="11" fill="#0B1220"/><text x="293.33333333333337" y="490" text-anchor="middle" fill="#6EE7B7" font-family="Inter, PingFang SC, sans-serif" font-size="11.5">逐帧立即转发</text><rect x="515" y="565" width="370" height="48" rx="16" fill="#3A2416" stroke="#FB923C" stroke-opacity=".5"/><text x="535" y="595" fill="#FDBA74" font-family="Inter, PingFang SC, sans-serif" font-size="13">关键：proxy_buffering off · CDN 不做响应聚合</text>
  <text x="1348" y="625" text-anchor="end" fill="#64748B" font-family="Inter, PingFang SC, sans-serif" font-size="11">AI 智能套件 · 0.2.23</text>
</svg>